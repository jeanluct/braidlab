name: CI CMake Artifacts

on:
  push:
    branches:
      - iss163-continuous-integration-github
    tags:
      - "release-*"
  pull_request:
  workflow_dispatch:
    inputs:
      matlab_release:
        description: MATLAB release for the release-pinned lane
        required: true
        default: R2024b
        type: string

env:
  BRAIDLAB_RELEASE_MATLAB: ${{ github.event.inputs.matlab_release || 'R2024b' }}

jobs:
  docs_pdf:
    name: Build guide PDF
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LaTeX tools
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra make

      - name: Build guide PDF
        run: make -C doc braidlab_guide.pdf

      - name: Upload guide PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf
          path: doc/braidlab_guide.pdf
          if-no-files-found: error

  release_pinned:
    name: Release Pinned (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: docs_pdf
    if: ${{ github.event_name != 'pull_request' || matrix.pr_enabled }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform_token: linux-ubuntu-22.04
            archive_ext: tar.gz
            pr_enabled: true
          - os: macos-latest
            platform_token: macos
            archive_ext: zip
            pr_enabled: false
          - os: windows-latest
            platform_token: windows
            archive_ext: zip
            pr_enabled: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MATLAB (release-pinned)
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ env.BRAIDLAB_RELEASE_MATLAB }}

      - name: Configure CMake
        shell: bash
        run: cmake -S . -B build -DBRAIDLAB_USE_GMP=ON

      - name: Build CMake targets
        shell: bash
        run: cmake --build build -j 4

      - name: Install staged package
        shell: bash
        run: cmake --install build --prefix stage

      - name: Download guide PDF
        uses: actions/download-artifact@v4
        with:
          name: docs-pdf
          path: stage/doc

      - name: MATLAB smoke test
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('stage');
            import braidlab.*;
            b = braid([1 2 -3]);
            c = b.compact;
            t = b.train;
            assert(~isempty(c));
            assert(isfield(t,'tntype'));
            disp(t.tntype);

      - name: Build package archive
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/release-* ]]; then
            VERSION="${GITHUB_REF#refs/tags/release-}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi

          case "${RUNNER_ARCH}" in
            X64) ARCH_TOKEN="x86_64" ;;
            ARM64) ARCH_TOKEN="arm64" ;;
            *) ARCH_TOKEN="$(printf '%s' "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')" ;;
          esac

          MATLAB_TOKEN="matlab-${BRAIDLAB_RELEASE_MATLAB}"
          BASE_NAME="braidlab-${VERSION}_${{ matrix.platform_token }}-${ARCH_TOKEN}_${MATLAB_TOKEN}"

          {
            echo "commit=${GITHUB_SHA}"
            echo "matlab_release=${BRAIDLAB_RELEASE_MATLAB}"
            echo "runner_os=${RUNNER_OS}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "platform_token=${{ matrix.platform_token }}"
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > stage/BUILD-MANIFEST.txt

          if [ "${{ matrix.archive_ext }}" = "tar.gz" ]; then
            ARCHIVE_NAME="${BASE_NAME}.tar.gz"
            tar -C stage -czf "${ARCHIVE_NAME}" +braidlab doc BUILD-MANIFEST.txt
          else
            ARCHIVE_NAME="${BASE_NAME}.zip"
            cmake -E chdir stage cmake -E tar cfv "../${ARCHIVE_NAME}" --format=zip +braidlab doc BUILD-MANIFEST.txt
          fi

          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  compat_latest:
    name: Compat Latest (ubuntu)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/release-') }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MATLAB (latest available)
        uses: matlab-actions/setup-matlab@v2

      - name: Configure CMake
        shell: bash
        run: cmake -S . -B build-compat -DBRAIDLAB_USE_GMP=ON

      - name: Build CMake targets
        shell: bash
        run: cmake --build build-compat -j 4

      - name: MATLAB smoke test
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('.');
            import braidlab.*;
            b = braid([1 2 -3]);
            c = b.compact;
            assert(~isempty(c));
